name: Daily menu update

on:
  # 매일 10:00 (KST) = UTC 01:00
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: daily-menu-update
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest weekly menus
        run: npm run update-menus

      - name: Build site
        run: npm run build

      - name: List build output
        run: find dist -type f | sort

      - name: Deploy to Cloudways (SFTP)
        timeout-minutes: 15
        env:
          SFTP_HOST: ${{ secrets.CW_SFTP_HOST }}
          SFTP_USER: ${{ secrets.CW_SFTP_USER }}
          SFTP_PASS: ${{ secrets.CW_SFTP_PASSWORD }}
          SFTP_DIR: ${{ secrets.CW_SFTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          if [ -z "${SFTP_HOST:-}" ] || [ -z "${SFTP_USER:-}" ] || [ -z "${SFTP_PASS:-}" ]; then
            echo "::error::Secrets 확인: CW_SFTP_HOST, CW_SFTP_USER, CW_SFTP_PASSWORD 가 필요합니다."
            exit 1
          fi

          # Secret에 sftp://, :22, 경로가 포함돼도 동작하도록 정규화
          SFTP_HOST="${SFTP_HOST#sftp://}"
          SFTP_HOST="${SFTP_HOST#ftp://}"
          SFTP_HOST="${SFTP_HOST%%/*}"
          SFTP_PORT="${SFTP_HOST##*:}"
          if [[ "${SFTP_PORT}" == "${SFTP_HOST}" ]]; then
            SFTP_PORT=22
          else
            SFTP_HOST="${SFTP_HOST%:*}"
          fi

          REMOTE_DIR="${SFTP_DIR:-public_html}"
          REMOTE_DIR="${REMOTE_DIR#/}"
          REMOTE_DIR="${REMOTE_DIR%/}"

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq lftp

          echo "Connecting to ${SFTP_HOST}:${SFTP_PORT} as ${SFTP_USER} ..."
          echo "Remote folder: ${REMOTE_DIR}"

          echo "Testing TCP port ${SFTP_PORT} ..."
          timeout 20 bash -c "until echo >/dev/tcp/${SFTP_HOST}/${SFTP_PORT}; do sleep 1; done"
          echo "Port ${SFTP_PORT} is reachable."

          set +x
          timeout 600 lftp -u "${SFTP_USER},${SFTP_PASS}" "sftp://${SFTP_HOST}:${SFTP_PORT}" <<SCRIPT
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          set cmd:verbose true
          set sftp:connect-program "ssh -a -x -o BatchMode=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${SFTP_PORT}"
          !echo "SFTP login OK"
          pwd
          cd ${REMOTE_DIR}
          !echo "Remote target: ${REMOTE_DIR}"
          pwd
          lcd dist
          !echo "Uploading dist/ ..."
          mirror -R --parallel=3 --only-newer --exclude-glob .git* --exclude-glob .DS_Store --exclude-glob api/data/*
          !echo "Upload finished"
          quit
          SCRIPT
          set -x

          echo "Deploy complete"

      - name: Purge Cloudways Varnish cache
        continue-on-error: true
        env:
          CW_EMAIL: ${{ secrets.CW_API_EMAIL }}
          CW_API_KEY: ${{ secrets.CW_API_KEY }}
          CW_APP_ID: ${{ secrets.CW_APP_ID }}
          CW_SERVER_ID: ${{ secrets.CW_SERVER_ID }}
        run: |
          set -uo pipefail

          if [ -z "${CW_EMAIL:-}" ] || [ -z "${CW_API_KEY:-}" ] || [ -z "${CW_APP_ID:-}" ]; then
            echo "::warning::CW_API_EMAIL, CW_API_KEY, CW_APP_ID Secret이 없어 Varnish purge를 건너뜁니다."
            exit 0
          fi

          echo "Requesting Cloudways API token (v1)..."
          RAW=$(curl -sS -w "\n%{http_code}" -X POST "https://api.cloudways.com/api/v1/oauth/access_token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "email=${CW_EMAIL}" \
            --data-urlencode "api_key=${CW_API_KEY}")

          HTTP_CODE=$(echo "${RAW}" | tail -n1)
          BODY=$(echo "${RAW}" | sed '$d')

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "v1 token failed (${HTTP_CODE}), trying v2..."
            RAW=$(curl -sS -w "\n%{http_code}" -X POST "https://api.cloudways.com/api/v2/oauth/access_token" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"${CW_EMAIL}\",\"api_key\":\"${CW_API_KEY}\"}")
            HTTP_CODE=$(echo "${RAW}" | tail -n1)
            BODY=$(echo "${RAW}" | sed '$d')
          fi

          echo "Token response HTTP ${HTTP_CODE}"
          TOKEN=$(echo "${BODY}" | jq -r '.access_token // empty')

          if [ -z "${TOKEN}" ]; then
            echo "::warning::Cloudways API token 발급 실패. 이메일/API Key를 확인하세요."
            echo "${BODY}"
            exit 0
          fi

          purge_with_v2() {
            curl -sS -w "\n%{http_code}" -X POST \
              "https://api.cloudways.com/api/v2/applications/${CW_APP_ID}/cache/clear" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/json"
          }

          purge_with_v1() {
            curl -sS -w "\n%{http_code}" -X POST \
              "https://api.cloudways.com/api/v1/app/cache/purge" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "server_id=${CW_SERVER_ID}&app_id=${CW_APP_ID}"
          }

          echo "Purging application cache for app ${CW_APP_ID}..."
          if [ -n "${CW_SERVER_ID:-}" ]; then
            RAW=$(purge_with_v1)
          else
            RAW=$(purge_with_v2)
          fi

          HTTP_CODE=$(echo "${RAW}" | tail -n1)
          BODY=$(echo "${RAW}" | sed '$d')
          echo "${BODY}"

          if [ "${HTTP_CODE}" = "200" ] || echo "${BODY}" | jq -e '.status == true' >/dev/null 2>&1; then
            echo "Varnish cache purge requested successfully"
            exit 0
          fi

          if [ -n "${CW_SERVER_ID:-}" ]; then
            echo "v1 purge failed (${HTTP_CODE}), trying v2..."
            RAW=$(purge_with_v2)
            HTTP_CODE=$(echo "${RAW}" | tail -n1)
            BODY=$(echo "${RAW}" | sed '$d')
            echo "${BODY}"
          fi

          if [ "${HTTP_CODE}" = "200" ] || echo "${BODY}" | jq -e '.status == true' >/dev/null 2>&1; then
            echo "Varnish cache purge requested successfully (v2)"
            exit 0
          fi

          echo "::warning::Varnish purge failed (HTTP ${HTTP_CODE}). 배포는 완료되었습니다. Cloudways에서 수동 Purge Varnish를 실행하세요."
          exit 0
