name: Weekly menu update

on:
  # 매주 월요일 10:00 (KST) = UTC 01:00
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

concurrency:
  group: weekly-menu-update
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest weekly menus
        run: npm run update-menus

      - name: Build site
        run: npm run build

      - name: List build output
        run: find dist -type f | sort

      - name: Deploy to Cloudways (SFTP)
        env:
          SFTP_HOST: ${{ secrets.CW_SFTP_HOST }}
          SFTP_USER: ${{ secrets.CW_SFTP_USER }}
          SFTP_PASS: ${{ secrets.CW_SFTP_PASSWORD }}
          SFTP_DIR: ${{ secrets.CW_SFTP_REMOTE_DIR }}
        run: |
          set -euxo pipefail

          if [ -z "${SFTP_HOST:-}" ] || [ -z "${SFTP_USER:-}" ] || [ -z "${SFTP_PASS:-}" ]; then
            echo "::error::Secrets 확인: CW_SFTP_HOST, CW_SFTP_USER, CW_SFTP_PASSWORD 가 필요합니다."
            exit 1
          fi

          REMOTE_DIR="${SFTP_DIR:-public_html}"
          REMOTE_DIR="${REMOTE_DIR#/}"
          REMOTE_DIR="${REMOTE_DIR%/}"

          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          echo "Connecting to ${SFTP_HOST} as ${SFTP_USER} ..."
          echo "Remote folder: ${REMOTE_DIR}"

          # LFTP_PASSWORD does not work for SFTP; pass credentials via -u user,pass
          set +x
          lftp -u "${SFTP_USER},${SFTP_PASS}" "sftp://${SFTP_HOST}:22" <<SCRIPT
          set cmd:fail-exit yes
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 22"
          pwd
          cd ${REMOTE_DIR}
          pwd
          lcd dist
          mirror -R -v --exclude-glob .git* --exclude-glob .DS_Store
          quit
          SCRIPT
          set -x

          echo "Deploy complete"
