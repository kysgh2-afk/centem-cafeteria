name: Weekly menu update

on:
  # 매주 월요일 10:00 (KST) = UTC 01:00
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest weekly menus
        run: npm run update-menus

      - name: Build site
        run: npm run build

      - name: List build output
        run: find dist -type f

      - name: Commit updated menu data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/weeks/
          if git diff --staged --quiet; then
            echo "No menu data changes to commit"
          else
            git commit -m "chore: update weekly cafeteria menus"
            git push
          fi

      - name: Deploy to Cloudways
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.CW_SFTP_HOST }}
          username: ${{ secrets.CW_SFTP_USER }}
          password: ${{ secrets.CW_SFTP_PASSWORD }}
          port: 22
          source: dist/*
          target: ${{ secrets.CW_SFTP_REMOTE_DIR }}
          strip_components: 1
          overwrite: true
